<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽毛球课时记录系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 20px;
        }
        .form-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ebeef5;
            border-radius: 4px;
        }
        .charts-section {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .chart-container {
            flex: 1;
            min-width: 300px;
            height: 400px;
        }
        .records-table {
            margin-top: 30px;
        }
        .el-form-item {
            margin-bottom: 18px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <h1 style="text-align: center; color: #409EFF;">羽毛球课时记录系统</h1>
            
            <!-- 表单部分 -->
            <div class="form-section">
                <h2>添加课时记录</h2>
                <el-form :model="recordForm" :rules="rules" ref="recordForm" label-width="100px">
                    <el-row :gutter="20">
                        <el-col :span="8">
                            <el-form-item label="上课日期" prop="date">
                                <el-date-picker
                                    v-model="recordForm.date"
                                    type="date"
                                    placeholder="选择日期"
                                    format="yyyy-MM-dd"
                                    value-format="yyyy-MM-dd"
                                    :picker-options="datePickerOptions"
                                    style="width: 100%;">
                                </el-date-picker>
                            </el-form-item>
                        </el-col>
                        <el-col :span="16">
                            <el-form-item label="学生姓名" prop="students">
                                <el-select 
                                    v-model="recordForm.students" 
                                    multiple 
                                    filterable 
                                    placeholder="请选择学生"
                                    style="width: 100%;">
                                    <el-option
                                        v-for="student in students"
                                        :key="student"
                                        :label="student"
                                        :value="student">
                                    </el-option>
                                </el-select>
                            </el-form-item>
                        </el-col>
                    </el-row>
                    
                    <el-row :gutter="20">
                        <el-col :span="8">
                            <el-form-item label="总计时长" prop="totalHours">
                                <el-input-number
                                    v-model="recordForm.totalHours"
                                    :precision="1"
                                    :step="0.5"
                                    :min="0"
                                    placeholder="请输入总课时"
                                    style="width: 100%;">
                                </el-input-number>
                            </el-form-item>
                        </el-col>
                        <el-col :span="8">
                            <el-form-item label="课程类型" prop="type">
                                <el-radio-group v-model="recordForm.type">
                                    <el-radio label="大课">大课</el-radio>
                                    <el-radio label="私教">私教</el-radio>
                                </el-radio-group>
                            </el-form-item>
                        </el-col>
                        <el-col :span="8">
                            <el-form-item label="备注">
                                <el-input v-model="recordForm.notes" placeholder="备注信息"></el-input>
                            </el-form-item>
                        </el-col>
                    </el-row>
                    
                    <el-form-item>
                        <el-button type="primary" @click="submitForm('recordForm')">提交记录</el-button>
                        <el-button @click="resetForm('recordForm')">重置</el-button>
                    </el-form-item>
                </el-form>
            </div>
            
            <!-- 图表部分 -->
            <div class="charts-section">
                <div class="chart-container">
                    <h3>每月课时总数统计</h3>
                    <canvas id="monthlyChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>本月学生课时明细</h3>
                    <canvas id="studentChart"></canvas>
                </div>
            </div>
            
            <!-- 记录表格 -->
            <div class="records-table">
                <h3>课时记录详情</h3>
                <el-table :data="records" style="width: 100%" stripe>
                    <el-table-column prop="date" label="上课日期" width="120"></el-table-column>
                    <el-table-column label="学生姓名" width="300">
                        <template slot-scope="scope">
                            <el-tag 
                                v-for="student in scope.row.students" 
                                :key="student" 
                                size="small" 
                                style="margin-right: 5px;">
                                {{student}}
                            </el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column prop="totalHours" label="总计时长" width="100"></el-table-column>
                    <el-table-column prop="type" label="课程类型" width="100"></el-table-column>
                    <el-table-column prop="notes" label="备注"></el-table-column>
                </el-table>
            </div>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data() {
                return {
                    recordForm: {
                        date: this.getDefaultDate(),
                        students: [],
                        totalHours: null,
                        type: '',
                        notes: ''
                    },
                    rules: {
                        date: [
                            { required: true, message: '请选择上课日期', trigger: 'change' }
                        ],
                        students: [
                            { required: true, message: '请选择学生姓名', trigger: 'change' }
                        ],
                        totalHours: [
                            { required: true, message: '请输入总计时长', trigger: 'blur' },
                            { type: 'number', min: 0, message: '课时不能为负数', trigger: 'blur' }
                        ],
                        type: [
                            { required: true, message: '请选择课程类型', trigger: 'change' }
                        ]
                    },
                    datePickerOptions: {
                        disabledDate(time) {
                            return time.getTime() > Date.now();
                        }
                    },
                    students: [
                        "严晨奕/严晨硕", "严晨硕", "付予诺", "刘子翚", "刘恒硕", "刘诗慧", "初荷", "包芯琪", 
                        "卢皓阳", "史震东", "商涵煦", "商湳然", "安哲修", "安婉玥", "宋江汉", "张俊哲", 
                        "张博瑞", "张壹帆", "张斯程", "张梓熙", "张秋实", "徐睿晗", "李悦恒", "梁茜雯", 
                        "王则沣", "王景怡", "王然", "王远航/王嘉航", "田玉娇", "耿培轩", "臧景悠", 
                        "贡雨桐", "赵艺雯", "逯一辰", "邱广超", "邱硕", "韩家豪", "高梓淇"
                    ],
                    records: JSON.parse(localStorage.getItem('badmintonRecords')) || []
                }
            },
            mounted() {
                this.initCharts();
            },
            watch: {
                records: {
                    handler(newVal) {
                        localStorage.setItem('badmintonRecords', JSON.stringify(newVal));
                        this.updateCharts();
                    },
                    deep: true
                }
            },
            methods: {
                getDefaultDate() {
                    const today = new Date();
                    const year = today.getFullYear();
                    const month = String(today.getMonth() + 1).padStart(2, '0');
                    const day = String(today.getDate()).padStart(2, '0');
                    return `${year}-${month}-${day}`;
                },
                submitForm(formName) {
                    this.$refs[formName].validate((valid) => {
                        if (valid) {
                            // 添加新记录
                            const newRecord = { ...this.recordForm };
                            this.records.push(newRecord);
                            
                            // 显示成功消息
                            this.$message.success('课时记录提交成功！');
                            
                            // 重置表单
                            this.resetForm(formName);
                        } else {
                            console.log('error submit!!');
                            return false;
                        }
                    });
                },
                resetForm(formName) {
                    this.$refs[formName].resetFields();
                    this.recordForm.date = this.getDefaultDate();
                },
                initCharts() {
                    // 初始化图表实例
                    this.monthlyChart = new Chart(document.getElementById('monthlyChart'), {
                        type: 'bar',
                        data: {
                            labels: [],
                            datasets: [{
                                label: '月度课时总数',
                                data: [],
                                backgroundColor: 'rgba(64, 158, 255, 0.6)',
                                borderColor: 'rgba(64, 158, 255, 1)',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });

                    this.studentChart = new Chart(document.getElementById('studentChart'), {
                        type: 'bar',
                        data: {
                            labels: [],
                            datasets: [{
                                label: '学生课时明细',
                                data: [],
                                backgroundColor: 'rgba(103, 194, 58, 0.6)',
                                borderColor: 'rgba(103, 194, 58, 1)',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            indexAxis: 'y',
                            responsive: true,
                            scales: {
                                x: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                    
                    this.updateCharts();
                },
                updateCharts() {
                    // 更新月度统计图表
                    const monthlyData = {};
                    this.records.forEach(record => {
                        const month = record.date.substring(0, 7); // YYYY-MM
                        if (!monthlyData[month]) {
                            monthlyData[month] = 0;
                        }
                        monthlyData[month] += parseFloat(record.totalHours);
                    });
                    
                    const months = Object.keys(monthlyData).sort();
                    this.monthlyChart.data.labels = months;
                    this.monthlyChart.data.datasets[0].data = months.map(m => monthlyData[m]);
                    this.monthlyChart.update();

                    // 更新本月学生明细图表
                    const currentMonth = this.getCurrentMonth();
                    const studentData = {};
                    this.records
                        .filter(record => record.date.startsWith(currentMonth))
                        .forEach(record => {
                            record.students.forEach(student => {
                                if (!studentData[student]) {
                                    studentData[student] = 0;
                                }
                                studentData[student] += parseFloat(record.totalHours) / record.students.length;
                            });
                        });
                    
                    const sortedStudents = Object.entries(studentData)
                        .sort((a, b) => b[1] - a[1])
                        .map(([student, hours]) => ({ student, hours }));
                    
                    this.studentChart.data.labels = sortedStudents.map(s => s.student);
                    this.studentChart.data.datasets[0].data = sortedStudents.map(s => s.hours);
                    this.studentChart.update();
                },
                getCurrentMonth() {
                    const today = new Date();
                    const year = today.getFullYear();
                    const month = String(today.getMonth() + 1).padStart(2, '0');
                    return `${year}-${month}`;
                }
            }
        });
    </script>
</body>
</html>
