<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>羽毛球课时记录系统</title>
  <script src="https://unpkg.com/vue@2.6.14/dist/vue.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; background-color: #f5f5f5; padding: 15px; }

    /* 表格样式 */
    .table-responsive { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
    th { background-color: #f8f9fa; font-weight: 600; color: #555; }
    tr:last-child td { border-bottom: none; }

    /* 表单样式 */
    .form-container { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 500; color: #333; }
    input[type="date"], input[type="number"], select, textarea { width: 100%; padding: 10px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 16px; }
    textarea { resize: vertical; min-height: 80px; }
    .tag { display: inline-block; background: #409eff; color: white; padding: 2px 8px; border-radius: 4px; margin: 2px; font-size: 12px; }
    .tag button { background: none; border: none; color: white; margin-left: 5px; cursor: pointer; }

    /* 按钮样式 */
    .btn { padding: 10px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: background-color 0.2s; }
    .btn-primary { background-color: #409eff; color: white; }
    .btn-success { background-color: #67c23a; color: white; }
    .btn-warning { background-color: #e6a23c; color: white; }
    .btn-danger { background-color: #f56c6c; color: white; }
    .btn-default { background-color: #909399; color: white; }
    .btn:hover { opacity: 0.85; }

    /* 弹窗样式 */
    .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .popup-content { background: white; border-radius: 8px; max-width: 90vw; max-height: 80vh; width: 400px; overflow: hidden; display: flex; flex-direction: column; }
    .popup-content h3 { margin: 0; padding: 15px; background: #f8f9fa; border-bottom: 1px solid #eee; text-align: center; }

    /* 月份筛选器 */
    .month-filter { padding: 15px; background: #f8f9fa; border-bottom: 1px solid #eee; }
    .month-filter label { margin-right: 10px; font-weight: 500; }
    .month-filter select { padding: 6px 10px; border: 1px solid #dcdfe6; border-radius: 4px; }

    /* 响应式表格 */
    @media (max-width: 768px) {
      th, td { padding: 8px 10px; font-size: 14px; }
      .form-container { padding: 15px; }
      .btn { padding: 8px 12px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>羽毛球课时记录系统</h1>

    <!-- 添加记录表单 -->
    <div class="form-container">
      <h2>添加课时记录 
        <button class="btn btn-default" @click="showStudentManager = true" style="font-size: 12px; padding: 2px 6px; vertical-align: middle;">管理名单</button>
      </h2>
      <form @submit.prevent="addRecord">
        <div class="form-group">
          <label for="date">日期</label>
          <input type="date" id="date" v-model="recordForm.date" required>
        </div>
        
        <div class="form-group">
          <label>学生姓名（可多选）</label>
          <div @click="showStudentPopup = true" style="border: 1px solid #dcdfe6; padding: 10px; border-radius: 4px; cursor: pointer; background-color: white;">
            <span v-if="selectedStudents.length === 0" style="color: #909399;">点击选择学生</span>
            <div v-else>
              <span class="tag" v-for="student in selectedStudents" :key="student">
                {{student}}
                <button @click.stop="removeStudent(student)" style="background:none; border:none; color:white; margin-left:5px; cursor:pointer;">×</button>
              </span>
            </div>
          </div>
        </div>
        
        <div class="form-group">
          <label for="totalHours">总课时</label>
          <input type="number" id="totalHours" v-model.number="recordForm.totalHours" step="0.5" min="0.5" placeholder="例如：1.0" required>
        </div>
        
        <div class="form-group">
          <label for="type">课程类型</label>
          <select id="type" v-model="recordForm.type">
            <option value="大课">大课</option>
            <option value="小课">小课</option>
            <option value="私教">私教</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="notes">备注</label>
          <textarea id="notes" v-model="recordForm.notes" placeholder="可选"></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">提交记录</button>
      </form>
    </div>

    <!-- 本月学生课时明细（带月份筛选器） -->
    <div class="table-responsive">
      <h3>学生课时明细</h3>
      <div class="month-filter">
        <label>选择月份：</label>
        <select v-model="selectedMonth" @change="calculateCurrentMonthStats">
          <option value="">全部月份</option>
          <option v-for="monthStat in monthlyStats" :value="monthStat.month" :key="monthStat.month">{{monthStat.month}}</option>
        </select>
      </div>
      <table>
        <thead>
          <tr>
            <th>学生姓名</th>
            <th>课时</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="(item, index) in filteredCurrentMonthStats" :key="index">
            <td>{{item.student}}</td>
            <td>{{item.hours}}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 学生选择弹窗 -->
    <div v-if="showStudentPopup" class="popup-overlay">
      <div class="popup-content" style="display: flex; flex-direction: column; height: 100%;">
        <h3 style="margin: 0 0 15px 0; text-align: center;">选择学生（可多选）</h3>
    
        <!-- 👇 所有学生都在这个 div 里，且只有它被 v-for -->
        <div style="flex: 1; overflow-y: auto; padding-bottom: 60px;">
          <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 10px;">
            <!-- ✅ 只有这一行被 v-for，里面不能有按钮！ -->
            <div 
              v-for="student in students"
              :key="student"
              @click="toggleStudentInPopup(student)"
              style="display:flex; align-items:center; padding:8px 10px; background:#f9f9f9; border-radius:4px; cursor:pointer;"
            >
              <input type="checkbox" :checked="tempSelectedStudents.includes(student)" style="width:18px;height:18px;margin-right:8px;" @click.stop>
              <span>{{ student }}</span>
            </div>
          </div>
        </div>
    
        <!-- ✅ 只有这里有一组按钮！不在 v-for 里！ -->
        <div style="position:sticky; bottom:0; background:white; padding:15px; border-top:1px solid #eee; display:flex; gap:10px;">
          <button class="btn btn-primary" @click="confirmSelection" style="flex:1;">确定</button>
          <button class="btn btn-default" @click="showStudentPopup = false" style="flex:1;">取消</button>
        </div>
      </div>
    </div>

    <!-- 学生管理弹窗 -->
    <div v-if="showStudentManager" class="popup-overlay">
      <div class="popup-content">
        <h3>学生名单管理</h3>
        
        <!-- 添加新学生 -->
        <div style="margin-bottom: 15px; display: flex; gap: 5px;">
          <input 
            v-model="newStudentName" 
            placeholder="输入新学生姓名" 
            style="flex: 1; padding: 8px;"
            @keyup.enter="addNewStudent"
          >
          <button class="btn btn-primary" @click="addNewStudent">添加</button>
        </div>
        
        <!-- 批量导入按钮 -->
        <div style="margin-bottom: 15px;">
          <button class="btn btn-default" @click="importStudents">批量导入</button>
        </div>
        
        <!-- 学生列表 -->
        <div style="max-height: 300px; overflow-y: auto;">
          <div 
            v-for="student in students" 
            :key="student"
            style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee;"
          >
            <span>{{ student }}</span>
            <button class="btn btn-danger" @click="removeStudentFromList(student)" style="padding: 2px 8px; font-size: 12px;">删除</button>
          </div>
        </div>
        
        <div style="margin-top: 15px; text-align: center;">
          <button class="btn btn-default" @click="showStudentManager = false">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    new Vue({
      el: '#app',
      data: {
        records: [],
        recordForm: {
          date: this.getDefaultDate(),
          students: [],
          totalHours: null,
          type: '大课',
          notes: ''
        },
        selectedStudents: [],
        tempSelectedStudents: [],
        showStudentPopup: false,
        showStudentManager: false,
        newStudentName: '',
        
        // 使用本地存储的学生名单
        students: this.loadStudentsFromLocalStorage(),
        
        // 统计相关
        monthlyStats: [],
        currentMonthStats: [],
        filteredCurrentMonthStats: [],
        selectedMonth: ''
      },
      
      created() {
        this.loadRecords();
      },
      
      methods: {
        getDefaultDate() {
          const now = new Date();
          return now.toISOString().split('T')[0];
        },

        // 从本地存储加载学生名单
        loadStudentsFromLocalStorage() {
          const saved = localStorage.getItem('badminton_students');
          if (saved) {
            try {
              return JSON.parse(saved).sort();
            } catch {
              return this.getDefaultStudents();
            }
          }
          return this.getDefaultStudents();
        },

        // 保存学生名单到本地存储
        saveStudentsToLocalStorage() {
          localStorage.setItem('badminton_students', JSON.stringify(this.students));
        },

        // 默认初始学生名单（仅首次加载时使用）
        getDefaultStudents() {
          return [
            "严晨奕/严晨硕", "付予诺", "刘子翚", "刘恒硕", "刘诗慧", "初荷", "包芯琪", 
            "卢皓阳", "史震东", "商涵煦", "商湳然", "安哲修", "安婉玥", "宋江汉", "张俊哲", 
            "张博瑞", "张壹帆", "张斯程", "张梓熙", "张秋实", "徐睿晗", "李悦恒", "梁茜雯", 
            "王则沣", "王景怡", "王然", "王远航/王嘉航", "田玉娇", "耿培轩", "臧景悠", 
            "贡雨桐", "赵艺雯", "逯一辰", "邱广超", "邱硕", "韩家豪", "高梓淇"
          ];
        },

        loadRecords() {
          const saved = localStorage.getItem('badminton_records');
          if (saved) {
            try {
              this.records = JSON.parse(saved);
            } catch {
              this.records = [];
            }
          }
          
          this.calculateMonthlyStats();
          this.calculateCurrentMonthStats();
        },
        
        saveRecords() {
          localStorage.setItem('badminton_records', JSON.stringify(this.records));
        },
        
        addRecord() {
          if (!this.recordForm.totalHours || this.selectedStudents.length === 0) {
            alert('请填写总课时和至少选择一名学生');
            return;
          }
          
          const newRecord = {
            id: Date.now(),
            date: this.recordForm.date,
            students: [...this.selectedStudents],
            totalHours: this.recordForm.totalHours,
            perStudentHours: this.recordForm.totalHours / this.selectedStudents.length,
            type: this.recordForm.type,
            notes: this.recordForm.notes
          };
          
          this.records.push(newRecord);
          this.saveRecords();
          this.calculateMonthlyStats();
          this.calculateCurrentMonthStats();
          
          // 重置表单
          this.recordForm = {
            date: this.getDefaultDate(),
            students: [],
            totalHours: null,
            type: '大课',
            notes: ''
          };
          this.selectedStudents = [];
          
          alert('记录添加成功！');
        },
        
        calculateMonthlyStats() {
          const statsMap = {};
          this.records.forEach(record => {
            const month = record.date.substring(0, 7); // YYYY-MM
            if (!statsMap[month]) {
              statsMap[month] = { month, records: [], totalHours: 0 };
            }
            
            statsMap[month].records.push(record);
            statsMap[month].totalHours += record.totalHours;
          });
          
          this.monthlyStats = Object.values(statsMap).sort((a, b) => b.month.localeCompare(a.month));
        },
        
        calculateCurrentMonthStats() {
          let recordsToProcess = this.records;
          if (this.selectedMonth) {
            recordsToProcess = recordsToProcess.filter(r => r.date.startsWith(this.selectedMonth));
          }
          
          const statsMap = {};
          recordsToProcess.forEach(record => {
            record.students.forEach(student => {
              if (!statsMap[student]) {
                statsMap[student] = 0;
              }
              statsMap[student] += record.perStudentHours;
            });
          });
          
          this.currentMonthStats = Object.entries(statsMap)
            .map(([student, hours]) => ({ student, hours }))
            .sort((a, b) => b.hours - a.hours);
          
          this.filteredCurrentMonthStats = this.currentMonthStats;
        },
        
        // 学生选择相关方法
        toggleStudentInPopup(student) {
          const index = this.tempSelectedStudents.indexOf(student);
          if (index > -1) {
            this.tempSelectedStudents.splice(index, 1);
          } else {
            this.tempSelectedStudents.push(student);
          }
        },
        
        confirmSelection() {
          this.selectedStudents = [...this.tempSelectedStudents];
          this.showStudentPopup = false;
        },
        
        removeStudent(student) {
          const index = this.selectedStudents.indexOf(student);
          if (index > -1) {
            this.selectedStudents.splice(index, 1);
          }
        },

        // 学生管理相关方法
        addNewStudent() {
          if (this.newStudentName.trim() && !this.students.includes(this.newStudentName.trim())) {
            this.students.push(this.newStudentName.trim());
            this.students.sort();
            this.saveStudentsToLocalStorage();
            this.newStudentName = '';
          }
        },

        removeStudentFromList(studentToRemove) {
          if (confirm(`确定要删除学生 "${studentToRemove}" 吗？`)) {
            this.students = this.students.filter(s => s !== studentToRemove);
            this.students.sort();
            this.saveStudentsToLocalStorage();
          }
        },

        importStudents() {
          const input = prompt('请输入学生姓名，用逗号分隔：');
          if (input) {
            const newStudents = input.split(',')
              .map(name => name.trim())
              .filter(name => name && !this.students.includes(name));
            
            if (newStudents.length > 0) {
              this.students = [...this.students, ...newStudents].sort();
              this.saveStudentsToLocalStorage();
              alert(`成功添加 ${newStudents.length} 名学生`);
            }
          }
        }
      }
    });
  </script>
</body>
</html>
